<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
    width:200px;
    height:200px;
    background:red;
    resize:both;
    overflow:auto;
}
    </style>
</head>
<body>
    
    <div class="box"></div>
    <script>
        const box = document.querySelector(".box");

const observer = new ResizeObserver((entries) => {
    console.log(entries);
});

observer.observe(box);
    </script>
</body>
</html>
